name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Native release builds
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static download site
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out the default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci
      - name: Build the static GitHub Pages site
        run: npm run pages:build
      - name: Add verified GitHub Release download links when the release exists
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            node scripts/release-metadata.mjs --repository "$GITHUB_REPOSITORY" --tag "$tag" --output native-dist/downloads/availability.json
          else
            echo "No $tag GitHub Release exists; download buttons remain unavailable." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload the static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: native-dist

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
